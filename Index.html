<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REYYFX Trading Journal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0F111A;
    color: #EAEAF0;
}

.container {
    padding: 20px;
}

h1 {
    text-align: center;
}

.brand {
    text-align: center;
    opacity: 0.7;
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #1A1D2E;
}

th, td {
    padding: 10px;
    text-align: center;
}

th {
    background: #22263A;
}

input, select {
    background: #0F111A;
    color: white;
    border: none;
    padding: 5px;
    width: 100%;
}

.profit {
    color: #00C853;
}

.loss {
    color: #FF3D00;
}

.dashboard {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
}

.card {
    background: #1A1D2E;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    width: 20%;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #2962FF;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>REYYFX TRADING JOURNAL</h1>
<div class="brand">Track Smart. Trade Better.</div>

<div class="dashboard">
    <div class="card">Total Trade<br><span id="total">0</span></div>
    <div class="card">Win Rate<br><span id="winrate">0%</span></div>
    <div class="card">Net Profit<br><span id="profit">0</span></div>
    <div class="card">Profit Factor<br><span id="pf">0</span></div>
</div>

<button onclick="addRow()">+ Add Trade</button>

<table id="journal">
<thead>
<tr>
<th>Tanggal</th>
<th>Asset</th>
<th>Arah</th>
<th>Entry</th>
<th>SL</th>
<th>TP</th>
<th>Lot</th>
<th>RR</th>
<th>Hasil</th>
<th>P/L</th>
</tr>
</thead>
<tbody>
</tbody>
</table>

<canvas id="chart" height="100"></canvas>

</div>

<script>
let trades = [];

function addRow() {
    const table = document.querySelector("#journal tbody");

    const row = table.insertRow();

    row.innerHTML = `
    <td><input type="date"></td>
    <td><input type="text"></td>
    <td>
        <select>
            <option>Buy</option>
            <option>Sell</option>
        </select>
    </td>
    <td><input type="number" step="0.01"></td>
    <td><input type="number" step="0.01"></td>
    <td><input type="number" step="0.01"></td>
    <td><input type="number" step="0.01"></td>
    <td class="rr">0</td>
    <td>
        <select>
            <option>Win</option>
            <option>Loss</option>
            <option>BE</option>
        </select>
    </td>
    <td class="pl">0</td>
    `;

    row.querySelectorAll("input, select").forEach(el => {
        el.addEventListener("change", calculate);
    });
}

function calculate() {
    trades = [];
    const rows = document.querySelectorAll("#journal tbody tr");

    let total = 0, win = 0, profit = 0, gain = 0, loss = 0;
    let equity = [];

    rows.forEach(row => {
        const arah = row.cells[2].querySelector("select").value;
        const entry = parseFloat(row.cells[3].querySelector("input").value) || 0;
        const sl = parseFloat(row.cells[4].querySelector("input").value) || 0;
        const tp = parseFloat(row.cells[5].querySelector("input").value) || 0;
        const lot = parseFloat(row.cells[6].querySelector("input").value) || 0;
        const hasil = row.cells[8].querySelector("select").value;

        let rr = 0;
        let pl = 0;

        if (arah === "Buy") {
            rr = (tp - entry) / (entry - sl);
        } else {
            rr = (entry - tp) / (sl - entry);
        }

        if (hasil === "Win") {
            pl = Math.abs(tp - entry) * lot;
            win++;
            gain += pl;
        } else if (hasil === "Loss") {
            pl = -Math.abs(entry - sl) * lot;
            loss += pl;
        }

        total++;
        profit += pl;

        row.querySelector(".rr").innerText = rr.toFixed(2);
        const plCell = row.querySelector(".pl");
        plCell.innerText = pl.toFixed(2);

        plCell.className = pl >= 0 ? "profit" : "loss";

        equity.push(profit);
    });

    document.getElementById("total").innerText = total;
    document.getElementById("winrate").innerText = total ? ((win/total)*100).toFixed(1)+"%" : "0%";
    document.getElementById("profit").innerText = profit.toFixed(2);
    document.getElementById("pf").innerText = loss ? (gain/Math.abs(loss)).toFixed(2) : 0;

    updateChart(equity);
}

let chart;

function updateChart(data) {
    const ctx = document.getElementById("chart").getContext("2d");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.map((_, i) => i+1),
            datasets: [{
                label: 'Equity Curve',
                data: data
            }]
        }
    });
}
</script>

</body>
  </html>
